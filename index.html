<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventory Manager</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e334d;
    --accent: #4f8ef7;
    --accent2: #7c5cf7;
    --green: #22c55e;
    --yellow: #f59e0b;
    --red: #ef4444;
    --text: #e8eaf6;
    --muted: #8892b0;
    --card-radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Top Nav ── */
  nav {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 28px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .nav-brand {
    display: flex; align-items: center; gap: 10px;
    font-size: 18px; font-weight: 700; letter-spacing: -0.3px;
  }
  .nav-brand .icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .nav-actions { display: flex; gap: 10px; align-items: center; }
  .btn {
    padding: 8px 16px; border-radius: 8px; border: none;
    cursor: pointer; font-size: 13px; font-weight: 600;
    display: inline-flex; align-items: center; gap: 6px;
    transition: all 0.15s;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #3a7ae0; transform: translateY(-1px); }
  .btn-outline {
    background: transparent; color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-outline:hover { background: var(--surface2); }
  .btn-ghost { background: transparent; color: var(--muted); }
  .btn-ghost:hover { color: var(--text); background: var(--surface2); }
  .btn-danger { background: var(--red); color: #fff; }
  .btn-danger:hover { background: #dc2626; }
  .btn-success { background: var(--green); color: #fff; }
  .btn-success:hover { background: #16a34a; }
  .btn-sm { padding: 6px 12px; font-size: 12px; }

  /* ── Layout ── */
  .main { padding: 28px; max-width: 1300px; margin: 0 auto; }

  /* ── Summary Cards ── */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px; margin-bottom: 28px;
  }
  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--card-radius);
    padding: 20px;
  }
  .summary-card .label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; }
  .summary-card .value { font-size: 32px; font-weight: 700; margin-top: 6px; }
  .summary-card .sub { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .summary-card.accent { border-color: var(--accent); }
  .summary-card.green { border-color: var(--green); }
  .summary-card.yellow { border-color: var(--yellow); }
  .summary-card.red { border-color: var(--red); }

  /* ── Tabs ── */
  .tabs { display: flex; gap: 4px; margin-bottom: 24px; background: var(--surface); padding: 4px; border-radius: 10px; width: fit-content; }
  .tab {
    padding: 8px 18px; border-radius: 8px; border: none;
    background: transparent; color: var(--muted); cursor: pointer;
    font-size: 13px; font-weight: 600; transition: all 0.15s;
  }
  .tab.active { background: var(--accent); color: #fff; }
  .tab:hover:not(.active) { color: var(--text); background: var(--surface2); }

  /* ── Section header ── */
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
  }
  .section-title { font-size: 16px; font-weight: 700; }

  /* ── Inventory Grid ── */
  .inventory-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }
  .item-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--card-radius);
    padding: 20px;
    transition: border-color 0.2s, transform 0.15s;
    position: relative;
    overflow: hidden;
  }
  .item-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .item-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    opacity: 0; transition: opacity 0.2s;
  }
  .item-card:hover::before { opacity: 1; }
  .item-card.low-stock { border-color: var(--yellow); }
  .item-card.low-stock::before { background: var(--yellow); opacity: 1; }
  .item-card.out-of-stock { border-color: var(--red); }
  .item-card.out-of-stock::before { background: var(--red); opacity: 1; }

  .item-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 14px; }
  .item-icon {
    width: 44px; height: 44px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; flex-shrink: 0;
  }
  .item-badge {
    font-size: 10px; font-weight: 700; padding: 3px 8px;
    border-radius: 20px; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .badge-green { background: rgba(34,197,94,0.15); color: var(--green); }
  .badge-yellow { background: rgba(245,158,11,0.15); color: var(--yellow); }
  .badge-red { background: rgba(239,68,68,0.15); color: var(--red); }

  .item-name { font-size: 14px; font-weight: 700; margin-bottom: 2px; }
  .item-category { font-size: 11px; color: var(--muted); }
  .item-qty {
    font-size: 40px; font-weight: 800; letter-spacing: -1px;
    margin: 10px 0 4px;
  }
  .item-unit { font-size: 12px; color: var(--muted); margin-bottom: 16px; }

  .item-actions { display: flex; gap: 8px; }
  .qty-control {
    display: flex; align-items: center; gap: 6px;
    background: var(--surface2); border-radius: 8px; padding: 4px;
    flex: 1;
  }
  .qty-btn {
    width: 30px; height: 30px; border-radius: 6px; border: none;
    background: var(--border); color: var(--text); cursor: pointer;
    font-size: 16px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .qty-btn:hover { background: var(--accent); }
  .qty-input {
    flex: 1; background: transparent; border: none;
    text-align: center; font-size: 14px; font-weight: 700;
    color: var(--text); width: 40px; outline: none;
  }
  .item-menu-btn {
    width: 34px; height: 34px; border-radius: 8px; border: 1px solid var(--border);
    background: transparent; color: var(--muted); cursor: pointer;
    font-size: 16px; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .item-menu-btn:hover { background: var(--surface2); color: var(--text); }

  /* ── Progress bar ── */
  .stock-bar { margin-top: 14px; }
  .stock-bar-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-bottom: 5px; }
  .stock-bar-track { height: 4px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .stock-bar-fill { height: 100%; border-radius: 4px; transition: width 0.4s; }

  /* ── Modal ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000; opacity: 0; pointer-events: none;
    transition: opacity 0.2s; backdrop-filter: blur(4px);
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 18px; padding: 28px; width: 420px; max-width: 95vw;
    transform: scale(0.95); transition: transform 0.2s;
  }
  .modal-overlay.open .modal { transform: scale(1); }
  .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
  .form-group { margin-bottom: 16px; }
  .form-label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; display: block; }
  .form-input, .form-select {
    width: 100%; padding: 10px 14px; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-size: 14px; outline: none;
    transition: border-color 0.15s;
  }
  .form-input:focus, .form-select:focus { border-color: var(--accent); }
  .form-select option { background: var(--surface2); }
  .modal-footer { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }

  /* ── Log tab ── */
  .log-filters { display: flex; gap: 10px; margin-bottom: 16px; align-items: center; flex-wrap: wrap; }
  .search-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 14px;
    color: var(--text); font-size: 13px; outline: none;
    width: 220px; transition: border-color 0.15s;
  }
  .search-box:focus { border-color: var(--accent); }
  .log-table-wrap { overflow-x: auto; }
  table {
    width: 100%; border-collapse: collapse;
    background: var(--surface); border-radius: var(--card-radius);
    overflow: hidden; border: 1px solid var(--border);
  }
  th {
    background: var(--surface2); padding: 12px 16px;
    text-align: left; font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted);
  }
  td { padding: 12px 16px; font-size: 13px; border-top: 1px solid var(--border); }
  tr:hover td { background: var(--surface2); }
  .tx-in { color: var(--green); font-weight: 700; }
  .tx-out { color: var(--red); font-weight: 700; }
  .tx-adjust { color: var(--yellow); font-weight: 700; }

  /* ── Toast ── */
  .toast-container { position: fixed; bottom: 24px; right: 24px; display: flex; flex-direction: column; gap: 8px; z-index: 2000; }
  .toast {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 18px; font-size: 13px;
    display: flex; align-items: center; gap: 10px;
    transform: translateX(120%); transition: transform 0.3s;
    min-width: 240px; box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .toast.show { transform: translateX(0); }
  .toast.toast-success { border-color: var(--green); }
  .toast.toast-error { border-color: var(--red); }

  /* ── Empty state ── */
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty .icon { font-size: 48px; margin-bottom: 12px; }
  .empty p { font-size: 14px; }

  /* ── Chip ── */
  .chip {
    display: inline-flex; align-items: center; gap: 4px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 20px; padding: 3px 10px; font-size: 11px; color: var(--muted);
  }

  /* Responsive */
  @media (max-width: 600px) {
    .main { padding: 16px; }
    nav { padding: 0 16px; }
    .summary-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<nav>
  <div class="nav-brand">
    <div class="icon">📦</div>
    Inventory Manager
  </div>
  <div class="nav-actions">
    <button class="btn btn-outline btn-sm" onclick="exportData()">⬇ Export</button>
    <button class="btn btn-primary btn-sm" onclick="openAddModal()">＋ Add Item</button>
  </div>
</nav>

<div class="main">

  <!-- Summary Cards -->
  <div class="summary-grid" id="summaryGrid"></div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('inventory', this)">📦 Inventory</button>
    <button class="tab" onclick="switchTab('log', this)">📋 Transaction Log</button>
  </div>

  <!-- Inventory Tab -->
  <div id="tab-inventory">
    <div class="section-header">
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
        <span class="section-title">All Items</span>
        <select class="form-select" style="width:auto;padding:6px 10px;font-size:12px;" id="categoryFilter" onchange="renderInventory()">
          <option value="">All Categories</option>
          <option value="Bar Chair">Bar Chair</option>
          <option value="Metal Pallet">Metal Pallet</option>
          <option value="Timber Pallet">Timber Pallet</option>
        </select>
      </div>
      <button class="btn btn-outline btn-sm" onclick="openTransactionModal()">⇄ Stock In / Out</button>
    </div>
    <div class="inventory-grid" id="inventoryGrid"></div>
  </div>

  <!-- Log Tab -->
  <div id="tab-log" style="display:none;">
    <div class="log-filters">
      <input class="search-box" placeholder="🔍 Search item or note..." id="logSearch" oninput="renderLog()">
      <select class="form-select" style="width:auto;padding:8px 12px;font-size:13px;" id="logTypeFilter" onchange="renderLog()">
        <option value="">All Types</option>
        <option value="IN">Stock In</option>
        <option value="OUT">Stock Out</option>
        <option value="ADJUST">Adjustment</option>
        <option value="ADD">Item Added</option>
      </select>
      <button class="btn btn-ghost btn-sm" onclick="clearLog()">🗑 Clear Log</button>
    </div>
    <div class="log-table-wrap">
      <table>
        <thead>
          <tr>
            <th>Date & Time</th>
            <th>Item</th>
            <th>Type</th>
            <th>Qty Change</th>
            <th>Balance After</th>
            <th>Note</th>
          </tr>
        </thead>
        <tbody id="logBody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Add Item Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-title">➕ Add New Item</div>
    <div class="form-group">
      <label class="form-label">Item Name</label>
      <input class="form-input" id="addName" placeholder="e.g. Bar Chair Standard">
    </div>
    <div class="form-group">
      <label class="form-label">Category</label>
      <select class="form-select" id="addCategory" onchange="toggleVariation()">
        <option value="Bar Chair">Bar Chair</option>
        <option value="Metal Pallet">Metal Pallet</option>
        <option value="Timber Pallet">Timber Pallet</option>
      </select>
    </div>
    <div class="form-group" id="variationGroup" style="display:none;">
      <label class="form-label">Thickness / Size</label>
      <select class="form-select" id="addVariation">
        <option value="1.5mm">1.5 mm</option>
        <option value="1.2mm">1.2 mm</option>
        <option value="0.95mm">0.95 mm</option>
        <option value="0.75mm">0.75 mm</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Initial Stock</label>
      <input class="form-input" id="addQty" type="number" placeholder="0" min="0" value="0">
    </div>
    <div class="form-group">
      <label class="form-label">Unit</label>
      <input class="form-input" id="addUnit" placeholder="pcs, kg, sets..." value="pcs">
    </div>
    <div class="form-group">
      <label class="form-label">Low Stock Alert Threshold</label>
      <input class="form-input" id="addThreshold" type="number" placeholder="10" min="0" value="10">
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('addModal')">Cancel</button>
      <button class="btn btn-primary" onclick="addItem()">Add Item</button>
    </div>
  </div>
</div>

<!-- Transaction Modal -->
<div class="modal-overlay" id="txModal">
  <div class="modal">
    <div class="modal-title" id="txModalTitle">⇄ Stock Transaction</div>
    <div class="form-group">
      <label class="form-label">Item</label>
      <select class="form-select" id="txItem"></select>
    </div>
    <div class="form-group">
      <label class="form-label">Transaction Type</label>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-success" style="flex:1" onclick="setTxType('IN',this)">⬆ Stock In</button>
        <button class="btn btn-outline" style="flex:1" onclick="setTxType('OUT',this)" id="txOutBtn">⬇ Stock Out</button>
        <button class="btn btn-outline" style="flex:1" onclick="setTxType('ADJUST',this)" id="txAdjBtn">⚙ Adjust</button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label" id="txQtyLabel">Quantity to Add</label>
      <input class="form-input" id="txQty" type="number" placeholder="0" min="1" value="1">
    </div>
    <div class="form-group">
      <label class="form-label">Note (optional)</label>
      <input class="form-input" id="txNote" placeholder="Delivery, sale, correction...">
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('txModal')">Cancel</button>
      <button class="btn btn-primary" onclick="applyTransaction()">Confirm</button>
    </div>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-title">✏️ Edit Item</div>
    <input type="hidden" id="editId">
    <div class="form-group">
      <label class="form-label">Item Name</label>
      <input class="form-input" id="editName">
    </div>
    <div class="form-group">
      <label class="form-label">Unit</label>
      <input class="form-input" id="editUnit">
    </div>
    <div class="form-group">
      <label class="form-label">Low Stock Alert Threshold</label>
      <input class="form-input" id="editThreshold" type="number" min="0">
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger" onclick="deleteItem()">🗑 Delete</button>
      <button class="btn btn-outline" onclick="closeModal('editModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveEdit()">Save</button>
    </div>
  </div>
</div>

<!-- Toast container -->
<div class="toast-container" id="toastContainer"></div>

<script>
// ─── Data ───────────────────────────────────────────────────────────────────
let items = JSON.parse(localStorage.getItem('inv_items') || '[]');
let logs  = JSON.parse(localStorage.getItem('inv_logs')  || '[]');
let txType = 'IN';

// Seed default items if empty
if (items.length === 0) {
  const defaults = [
    { id: uid(), name: 'Bar Chair', category: 'Bar Chair', variation: '', qty: 0, unit: 'pcs', threshold: 10 },
    { id: uid(), name: 'Metal Pallet 1.5mm', category: 'Metal Pallet', variation: '1.5mm', qty: 0, unit: 'pcs', threshold: 10 },
    { id: uid(), name: 'Metal Pallet 1.2mm', category: 'Metal Pallet', variation: '1.2mm', qty: 0, unit: 'pcs', threshold: 10 },
    { id: uid(), name: 'Metal Pallet 0.95mm', category: 'Metal Pallet', variation: '0.95mm', qty: 0, unit: 'pcs', threshold: 10 },
    { id: uid(), name: 'Metal Pallet 0.75mm', category: 'Metal Pallet', variation: '0.75mm', qty: 0, unit: 'pcs', threshold: 10 },
    { id: uid(), name: 'Timber Pallet', category: 'Timber Pallet', variation: '', qty: 0, unit: 'pcs', threshold: 10 },
  ];
  items = defaults;
  save();
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function save() {
  localStorage.setItem('inv_items', JSON.stringify(items));
  localStorage.setItem('inv_logs', JSON.stringify(logs));
}

// ─── Icons & Colors ─────────────────────────────────────────────────────────
function categoryStyle(cat) {
  const map = {
    'Bar Chair':     { icon: '🪑', bg: 'rgba(79,142,247,0.15)', color: '#4f8ef7' },
    'Metal Pallet':  { icon: '🔩', bg: 'rgba(124,92,247,0.15)', color: '#7c5cf7' },
    'Timber Pallet': { icon: '🪵', bg: 'rgba(245,158,11,0.15)', color: '#f59e0b' },
  };
  return map[cat] || { icon: '📦', bg: 'rgba(255,255,255,0.1)', color: '#8892b0' };
}

function stockStatus(item) {
  if (item.qty <= 0) return 'out-of-stock';
  if (item.qty <= item.threshold) return 'low-stock';
  return 'in-stock';
}

function stockBadge(item) {
  const s = stockStatus(item);
  if (s === 'out-of-stock') return `<span class="item-badge badge-red">Out of Stock</span>`;
  if (s === 'low-stock')    return `<span class="item-badge badge-yellow">Low Stock</span>`;
  return `<span class="item-badge badge-green">In Stock</span>`;
}

function barColor(item) {
  const s = stockStatus(item);
  if (s === 'out-of-stock') return 'var(--red)';
  if (s === 'low-stock')    return 'var(--yellow)';
  return 'var(--green)';
}

// ─── Render Summary ──────────────────────────────────────────────────────────
function renderSummary() {
  const total   = items.length;
  const inStock = items.filter(i => i.qty > i.threshold).length;
  const low     = items.filter(i => i.qty > 0 && i.qty <= i.threshold).length;
  const out     = items.filter(i => i.qty <= 0).length;
  const totalQty = items.reduce((s,i) => s + i.qty, 0);

  document.getElementById('summaryGrid').innerHTML = `
    <div class="summary-card accent">
      <div class="label">Total Items</div>
      <div class="value" style="color:var(--accent)">${total}</div>
      <div class="sub">product types tracked</div>
    </div>
    <div class="summary-card green">
      <div class="label">In Stock</div>
      <div class="value" style="color:var(--green)">${inStock}</div>
      <div class="sub">above threshold</div>
    </div>
    <div class="summary-card yellow">
      <div class="label">Low Stock</div>
      <div class="value" style="color:var(--yellow)">${low}</div>
      <div class="sub">needs attention</div>
    </div>
    <div class="summary-card red">
      <div class="label">Out of Stock</div>
      <div class="value" style="color:var(--red)">${out}</div>
      <div class="sub">restock required</div>
    </div>
    <div class="summary-card">
      <div class="label">Total Units</div>
      <div class="value">${totalQty.toLocaleString()}</div>
      <div class="sub">across all items</div>
    </div>
  `;
}

// ─── Render Inventory ────────────────────────────────────────────────────────
function renderInventory() {
  const filter = document.getElementById('categoryFilter').value;
  let filtered = filter ? items.filter(i => i.category === filter) : items;

  if (filtered.length === 0) {
    document.getElementById('inventoryGrid').innerHTML = `
      <div class="empty" style="grid-column:1/-1">
        <div class="icon">📭</div>
        <p>No items found. Add some inventory!</p>
      </div>`;
    return;
  }

  // Sort: out → low → in
  const order = { 'out-of-stock':0, 'low-stock':1, 'in-stock':2 };
  filtered = [...filtered].sort((a,b) => order[stockStatus(a)] - order[stockStatus(b)]);

  document.getElementById('inventoryGrid').innerHTML = filtered.map(item => {
    const style = categoryStyle(item.category);
    const status = stockStatus(item);
    const maxBar = Math.max(item.qty, item.threshold * 2, 1);
    const fillPct = Math.min((item.qty / maxBar) * 100, 100);
    const varChip = item.variation ? `<span class="chip">📐 ${item.variation}</span>` : '';

    return `
    <div class="item-card ${status}" id="card-${item.id}">
      <div class="item-header">
        <div class="item-icon" style="background:${style.bg};">${style.icon}</div>
        ${stockBadge(item)}
      </div>
      <div class="item-name">${item.name}</div>
      <div class="item-category">${item.category} ${varChip}</div>
      <div class="item-qty" style="color:${barColor(item)}">${item.qty.toLocaleString()}</div>
      <div class="item-unit">${item.unit} &nbsp;·&nbsp; Alert at ${item.threshold}</div>

      <div class="item-actions">
        <div class="qty-control">
          <button class="qty-btn" onclick="quickAdjust('${item.id}', -1)">−</button>
          <input class="qty-input" type="number" value="1" min="1" id="qin-${item.id}">
          <button class="qty-btn" onclick="quickAdjust('${item.id}', 1)">＋</button>
        </div>
        <button class="item-menu-btn" onclick="openEditModal('${item.id}')" title="Edit item">⋯</button>
      </div>

      <div class="stock-bar">
        <div class="stock-bar-label">
          <span>Stock level</span>
          <span>${item.qty} / ${item.threshold * 2} (target)</span>
        </div>
        <div class="stock-bar-track">
          <div class="stock-bar-fill" style="width:${fillPct}%;background:${barColor(item)};"></div>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ─── Quick Adjust (card +/- buttons) ────────────────────────────────────────
function quickAdjust(id, dir) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  const qInput = document.getElementById(`qin-${id}`);
  const qty = parseInt(qInput?.value) || 1;
  const change = dir * qty;
  const newQty = Math.max(0, item.qty + change);
  const diff = newQty - item.qty;
  if (diff === 0) return;
  item.qty = newQty;
  logs.unshift({ id: uid(), ts: new Date().toISOString(), itemId: id, itemName: item.name, type: diff > 0 ? 'IN' : 'OUT', change: diff, balance: newQty, note: 'Quick adjust' });
  save();
  // Update only this card in-place — no full re-render so the card stays put
  updateCardInPlace(item);
  renderSummary();
  toast(diff > 0 ? `+${diff} added to ${item.name}` : `${diff} removed from ${item.name}`, diff > 0 ? 'success' : 'error');
}

// Update a single card's visuals without moving it in the grid
function updateCardInPlace(item) {
  const card = document.getElementById(`card-${item.id}`);
  if (!card) return;

  const status = stockStatus(item);
  const color  = barColor(item);
  const maxBar = Math.max(item.qty, item.threshold * 2, 1);
  const fillPct = Math.min((item.qty / maxBar) * 100, 100);

  // Card border class
  card.className = `item-card ${status}`;

  // Quantity number + colour
  const qtyEl = card.querySelector('.item-qty');
  if (qtyEl) { qtyEl.textContent = item.qty.toLocaleString(); qtyEl.style.color = color; }

  // Status badge
  const headerEl = card.querySelector('.item-header');
  if (headerEl) {
    const badge = headerEl.querySelector('.item-badge');
    if (badge) badge.outerHTML; // placeholder — replace below
    headerEl.innerHTML = headerEl.innerHTML.replace(
      /<span class="item-badge[^"]*">[^<]*<\/span>/,
      stockBadge(item)
    );
  }

  // Progress bar fill + label
  const fill = card.querySelector('.stock-bar-fill');
  if (fill) { fill.style.width = fillPct + '%'; fill.style.background = color; }
  const barLabel = card.querySelector('.stock-bar-label span:last-child');
  if (barLabel) barLabel.textContent = `${item.qty} / ${item.threshold * 2} (target)`;
}

// ─── Transaction Modal ───────────────────────────────────────────────────────
function openTransactionModal(preItemId) {
  const sel = document.getElementById('txItem');
  sel.innerHTML = items.map(i => `<option value="${i.id}">${i.name} (${i.qty} ${i.unit})</option>`).join('');
  if (preItemId) sel.value = preItemId;
  setTxType('IN', null);
  document.getElementById('txNote').value = '';
  document.getElementById('txQty').value = 1;
  openModal('txModal');
}

function setTxType(type, btn) {
  txType = type;
  // Reset all type buttons to outline
  document.querySelectorAll('#txModal .btn').forEach(b => {
    if (['Stock In','Stock Out','Adjust'].some(t => b.textContent.includes(t))) {
      b.className = 'btn btn-outline';
      b.style.flex = '1';
    }
  });
  // Highlight the active button — use passed btn or find it by text
  const target = btn || [...document.querySelectorAll('#txModal .btn')].find(b =>
    (type === 'IN'     && b.textContent.includes('Stock In'))  ||
    (type === 'OUT'    && b.textContent.includes('Stock Out')) ||
    (type === 'ADJUST' && b.textContent.includes('Adjust'))
  );
  if (target) {
    target.className = type === 'IN' ? 'btn btn-success' : type === 'OUT' ? 'btn btn-danger' : 'btn btn-primary';
    target.style.flex = '1';
  }
  const labels = { IN: 'Quantity to Add', OUT: 'Quantity to Remove', ADJUST: 'Set Stock to (absolute value)' };
  document.getElementById('txQtyLabel').textContent = labels[type];
}

function applyTransaction() {
  const id = document.getElementById('txItem').value;
  const qty = parseInt(document.getElementById('txQty').value);
  const note = document.getElementById('txNote').value;
  // ADJUST allows 0 (set stock to zero); IN/OUT require a positive number
  const invalid = isNaN(qty) || qty < 0 || (txType !== 'ADJUST' && qty <= 0);
  if (invalid) { toast('Enter a valid quantity', 'error'); return; }

  const item = items.find(i => i.id === id);
  if (!item) return;
  const before = item.qty;
  if (txType === 'IN')     item.qty = before + qty;
  if (txType === 'OUT')    item.qty = Math.max(0, before - qty);
  if (txType === 'ADJUST') item.qty = qty;
  const diff = item.qty - before;

  logs.unshift({ id: uid(), ts: new Date().toISOString(), itemId: id, itemName: item.name, type: txType, change: diff, balance: item.qty, note });
  save(); renderAll(); closeModal('txModal');
  toast(`${item.name} updated → ${item.qty} ${item.unit}`, 'success');
}

// ─── Add Item Modal ──────────────────────────────────────────────────────────
function openAddModal() {
  // Fully reset every field — don't rely on previous state
  document.getElementById('addName').value = '';
  document.getElementById('addQty').value = 0;
  document.getElementById('addUnit').value = 'pcs';
  document.getElementById('addThreshold').value = 10;
  // Force category back to first option (Bar Chair) using selectedIndex
  const catSel = document.getElementById('addCategory');
  catSel.selectedIndex = 0;
  // Also reset variation dropdown to first option
  document.getElementById('addVariation').selectedIndex = 0;
  // Hide variation group since default is Bar Chair
  document.getElementById('variationGroup').style.display = 'none';
  openModal('addModal');
  setTimeout(() => document.getElementById('addName').focus(), 200);
}

function toggleVariation() {
  const cat = document.getElementById('addCategory').value;
  document.getElementById('variationGroup').style.display = cat === 'Metal Pallet' ? 'block' : 'none';
}

function addItem() {
  const name     = document.getElementById('addName').value.trim();
  const category = document.getElementById('addCategory').value;
  // Only use variation if category is Metal Pallet AND variation group is visible
  const variationGroup = document.getElementById('variationGroup');
  const variation = (category === 'Metal Pallet' && variationGroup.style.display !== 'none')
    ? document.getElementById('addVariation').value
    : '';
  const qty      = parseInt(document.getElementById('addQty').value) || 0;
  const unit     = document.getElementById('addUnit').value.trim() || 'pcs';
  const threshold = parseInt(document.getElementById('addThreshold').value) || 10;
  if (!name) { toast('Please enter an item name', 'error'); return; }

  // Keep name clean — variation shown as separate chip on the card, not appended to name
  const id = uid();
  const displayName = variation ? `${name} (${variation})` : name;
  items.push({ id, name: displayName, category, variation, qty, unit, threshold });
  logs.unshift({ id: uid(), ts: new Date().toISOString(), itemId: id, itemName: displayName, type: 'ADD', change: qty, balance: qty, note: 'Item created' });
  save(); renderAll(); closeModal('addModal');
  toast(`"${displayName}" added to inventory`, 'success');
}

// ─── Edit Modal ──────────────────────────────────────────────────────────────
function openEditModal(id) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  document.getElementById('editId').value = id;
  document.getElementById('editName').value = item.name;
  document.getElementById('editUnit').value = item.unit;
  document.getElementById('editThreshold').value = item.threshold;
  openModal('editModal');
}

function saveEdit() {
  const id   = document.getElementById('editId').value;
  const item = items.find(i => i.id === id);
  if (!item) return;
  item.name      = document.getElementById('editName').value.trim() || item.name;
  item.unit      = document.getElementById('editUnit').value.trim() || item.unit;
  item.threshold = parseInt(document.getElementById('editThreshold').value) || 10;
  save(); renderAll(); closeModal('editModal');
  toast('Item updated', 'success');
}

function deleteItem() {
  const id = document.getElementById('editId').value;
  if (!confirm('Delete this item? This cannot be undone.')) return;
  items = items.filter(i => i.id !== id);
  save(); renderAll(); closeModal('editModal');
  toast('Item deleted', 'error');
}

// ─── Log Tab ─────────────────────────────────────────────────────────────────
function renderLog() {
  const search  = document.getElementById('logSearch').value.toLowerCase();
  const typeF   = document.getElementById('logTypeFilter').value;
  let filtered  = logs.filter(l => {
    const matchT = !typeF || l.type === typeF;
    const matchS = !search || l.itemName.toLowerCase().includes(search) || (l.note||'').toLowerCase().includes(search);
    return matchT && matchS;
  });

  const tbody = document.getElementById('logBody');
  if (filtered.length === 0) {
    tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:40px">No transactions found</td></tr>`;
    return;
  }
  tbody.innerHTML = filtered.map(l => {
    const d = new Date(l.ts);
    const dateStr = d.toLocaleDateString('en-AU', { day:'2-digit', month:'short', year:'numeric' });
    const timeStr = d.toLocaleTimeString('en-AU', { hour:'2-digit', minute:'2-digit' });
    const typeMap = {
      IN:     `<span class="tx-in">⬆ IN</span>`,
      OUT:    `<span class="tx-out">⬇ OUT</span>`,
      ADJUST: `<span class="tx-adjust">⚙ ADJUST</span>`,
      ADD:    `<span style="color:var(--accent);font-weight:700">✦ ADDED</span>`,
    };
    const changeStr = l.change >= 0 ? `<span class="tx-in">+${l.change}</span>` : `<span class="tx-out">${l.change}</span>`;
    return `
      <tr>
        <td style="white-space:nowrap;color:var(--muted);font-size:12px">${dateStr}<br>${timeStr}</td>
        <td><strong>${l.itemName}</strong></td>
        <td>${typeMap[l.type] || l.type}</td>
        <td>${changeStr}</td>
        <td>${l.balance}</td>
        <td style="color:var(--muted)">${l.note || '—'}</td>
      </tr>`;
  }).join('');
}

function clearLog() {
  if (!confirm('Clear all transaction history?')) return;
  logs = [];
  save(); renderLog();
  toast('Transaction log cleared', 'error');
}

// ─── Tab Switching ────────────────────────────────────────────────────────────
function switchTab(tab, el) {
  document.getElementById('tab-inventory').style.display = tab === 'inventory' ? '' : 'none';
  document.getElementById('tab-log').style.display       = tab === 'log' ? '' : 'none';
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  if (tab === 'log') renderLog();
}

// ─── Modals ───────────────────────────────────────────────────────────────────
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); });
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.querySelectorAll('.modal-overlay.open').forEach(m => m.classList.remove('open'));
});

// ─── Toast ────────────────────────────────────────────────────────────────────
function toast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.innerHTML = `<span>${type === 'success' ? '✅' : '❌'}</span> ${msg}`;
  document.getElementById('toastContainer').appendChild(el);
  requestAnimationFrame(() => { el.classList.add('show'); });
  setTimeout(() => { el.classList.remove('show'); setTimeout(() => el.remove(), 300); }, 2800);
}

// ─── Export ───────────────────────────────────────────────────────────────────
function exportData() {
  const rows = [['Item Name','Category','Variation','Qty','Unit','Threshold','Status']];
  items.forEach(i => rows.push([i.name, i.category, i.variation, i.qty, i.unit, i.threshold, stockStatus(i)]));
  const csv = rows.map(r => r.map(v => `"${v}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = `inventory_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  toast('Inventory exported as CSV', 'success');
}

// ─── Render All ───────────────────────────────────────────────────────────────
function renderAll() {
  renderSummary();
  renderInventory();
}

renderAll();
</script>
