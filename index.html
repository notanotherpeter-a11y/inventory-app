<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Masterform Inventory Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:             #080a10;
    --sidebar-bg:     #0d0f18;
    --surface:        rgba(18,21,35,0.92);
    --surface-border: rgba(255,255,255,0.12);
    --surface-hover:  rgba(24,27,44,0.97);
    --accent:         #c0392b;
    --accent2:        #e74c3c;
    --green:          #10b981;
    --yellow:         #f59e0b;
    --red:            #ef4444;
    --text:           #f0f2f8;
    --muted:          #6b7280;
    --sidebar-w:      220px;
    --sidebar-coll-w: 64px;
    --topbar-h:       56px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    background-image: url('bg.jpg');
    background-size: cover;
    background-position: center center;
    background-attachment: fixed;
    image-rendering: -webkit-optimize-contrast;
    image-rendering: crisp-edges;
    -webkit-font-smoothing: antialiased;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: rgba(5,6,12,0.93);
    z-index: 0;
    pointer-events: none;
  }

  /* ─── Scrollbar ─── */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

  /* ════════════════════════════════════
     SIDEBAR
  ════════════════════════════════════ */
  .sidebar {
    position: fixed;
    top: 0; left: 0; bottom: 0;
    width: var(--sidebar-w);
    background: rgba(13,15,24,0.95);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-right: 1px solid rgba(255,255,255,0.06);
    z-index: 200;
    display: flex;
    flex-direction: column;
    transition: width 0.25s cubic-bezier(0.4,0,0.2,1);
    overflow: hidden;
  }
  .sidebar.collapsed { width: var(--sidebar-coll-w); }

  /* Brand */
  .sidebar-brand {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 22px 0 18px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    flex-shrink: 0;
    gap: 10px;
    min-height: 100px;
  }
  .sidebar-brand img {
    height: 32px;
    width: auto;
    object-fit: contain;
    flex-shrink: 0;
    transition: opacity 0.15s;
  }
  .sidebar-brand-text {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    text-align: center;
    line-height: 1.5;
    white-space: nowrap;
    opacity: 1;
    transition: opacity 0.15s;
    letter-spacing: 0.02em;
  }
  .sidebar.collapsed .sidebar-brand-text { opacity: 0; pointer-events: none; }

  /* Nav */
  .sidebar-nav {
    flex: 1;
    padding: 14px 8px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    overflow-y: auto;
    overflow-x: hidden;
  }
  .sidebar-nav::-webkit-scrollbar { display: none; }

  .nav-item {
    position: relative;
    display: flex;
    align-items: center;
    gap: 11px;
    padding: 10px 12px;
    border-radius: 10px;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--muted);
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 13px;
    font-weight: 500;
    width: 100%;
    text-align: left;
    transition: background 0.2s cubic-bezier(0.4,0,0.2,1), color 0.2s cubic-bezier(0.4,0,0.2,1);
    white-space: nowrap;
    min-height: 42px;
    letter-spacing: 0.01em;
  }
  .nav-item:hover {
    background: rgba(255,255,255,0.05);
    color: var(--text);
  }
  .nav-item.active {
    background: rgba(192,57,43,0.12);
    color: var(--text);
    font-weight: 600;
  }
  .nav-item.active::before {
    content: '';
    position: absolute;
    left: 0; top: 50%;
    transform: translateY(-50%);
    width: 3px; height: 60%;
    background: var(--accent);
    border-radius: 0 3px 3px 0;
  }
  .nav-item .nav-icon {
    font-size: 17px;
    flex-shrink: 0;
    width: 22px;
    text-align: center;
    line-height: 1;
  }
  .nav-item .nav-label {
    opacity: 1;
    transition: opacity 0.15s;
    flex: 1;
  }
  .sidebar.collapsed .nav-item .nav-label { opacity: 0; pointer-events: none; width: 0; }
  .sidebar.collapsed .nav-item { justify-content: center; padding: 10px 0; gap: 0; }
  .sidebar.collapsed .nav-item.active::before { display: none; }

  /* Divider */
  .sidebar-divider {
    height: 1px;
    background: rgba(255,255,255,0.06);
    margin: 6px 12px;
    flex-shrink: 0;
  }

  /* Quick Stats */
  .sidebar-stats {
    padding: 10px 8px 8px;
    flex-shrink: 0;
  }
  .sidebar-stats-title {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--muted);
    padding: 0 12px 10px;
    white-space: nowrap;
    opacity: 1;
    transition: opacity 0.15s;
  }
  .sidebar.collapsed .sidebar-stats-title { opacity: 0; }

  .sidebar-stat {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    border-radius: 10px;
    gap: 10px;
    transition: background 0.2s cubic-bezier(0.4,0,0.2,1);
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.04);
    margin-bottom: 4px;
  }
  .sidebar-stat:hover { background: rgba(255,255,255,0.05); }
  .sidebar-stat-label {
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
    opacity: 1;
    transition: opacity 0.15s;
    font-weight: 500;
  }
  .sidebar-stat-value {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    flex-shrink: 0;
    letter-spacing: -0.02em;
  }
  .sidebar.collapsed .sidebar-stat-label { opacity: 0; width: 0; overflow: hidden; }
  .sidebar.collapsed .sidebar-stat { justify-content: center; padding: 8px 0; }

  /* Collapse Toggle */
  .sidebar-toggle {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding: 12px 14px;
    border-top: 1px solid rgba(255,255,255,0.06);
    flex-shrink: 0;
  }
  .sidebar.collapsed .sidebar-toggle { justify-content: center; padding: 12px 0; }
  .toggle-btn {
    width: 32px; height: 32px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.04);
    color: var(--muted);
    cursor: pointer;
    font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s cubic-bezier(0.4,0,0.2,1);
    flex-shrink: 0;
  }
  .toggle-btn:hover {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  /* ════════════════════════════════════
     LAYOUT SHELL
  ════════════════════════════════════ */
  .layout {
    position: relative;
    z-index: 1;
    margin-left: var(--sidebar-w);
    transition: margin-left 0.25s cubic-bezier(0.4,0,0.2,1);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .layout.collapsed { margin-left: var(--sidebar-coll-w); }

  /* ════════════════════════════════════
     TOPBAR
  ════════════════════════════════════ */
  .topbar {
    height: var(--topbar-h);
    background: rgba(8,10,16,0.8);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 28px;
    position: sticky;
    top: 0;
    z-index: 100;
    flex-shrink: 0;
  }
  .topbar-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .topbar-breadcrumb {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .topbar-breadcrumb-root {
    font-size: 12px;
    color: var(--muted);
    font-weight: 500;
    letter-spacing: 0.02em;
  }
  .topbar-breadcrumb-sep {
    color: rgba(255,255,255,0.15);
    font-size: 14px;
  }
  .topbar-breadcrumb-page {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.01em;
  }
  .topbar-actions {
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .topbar-date {
    font-size: 12px;
    color: var(--muted);
    font-weight: 500;
    letter-spacing: 0.02em;
  }

  /* Mobile hamburger */
  .mobile-menu-btn {
    display: none;
    width: 36px; height: 36px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.1);
    background: transparent;
    color: var(--text);
    cursor: pointer;
    font-size: 16px;
    align-items: center; justify-content: center;
  }

  /* ════════════════════════════════════
     BUTTONS
  ════════════════════════════════════ */
  .btn {
    padding: 8px 16px;
    border-radius: 9px;
    border: none;
    cursor: pointer;
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 13px;
    font-weight: 600;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: all 0.2s cubic-bezier(0.4,0,0.2,1);
    letter-spacing: 0.01em;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
    border: 1px solid var(--accent);
  }
  .btn-primary:hover {
    background: var(--accent2);
    border-color: var(--accent2);
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(192,57,43,0.3);
  }
  .btn-outline {
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
  }
  .btn-outline:hover {
    background: rgba(192,57,43,0.1);
    transform: translateY(-1px);
  }
  .btn-subtle {
    background: rgba(255,255,255,0.04);
    color: var(--muted);
    border: 1px solid rgba(255,255,255,0.08);
  }
  .btn-subtle:hover {
    background: rgba(255,255,255,0.08);
    color: var(--text);
  }
  .btn-ghost { background: transparent; color: var(--muted); border: none; }
  .btn-ghost:hover { color: var(--text); background: rgba(255,255,255,0.05); }
  .btn-danger { background: var(--red); color: #fff; border: 1px solid var(--red); }
  .btn-danger:hover { background: #dc2626; border-color: #dc2626; }
  .btn-success { background: var(--green); color: #fff; border: 1px solid var(--green); }
  .btn-success:hover { background: #059669; border-color: #059669; }
  .btn-sm { padding: 7px 13px; font-size: 12px; border-radius: 8px; }

  /* ════════════════════════════════════
     MAIN CONTENT
  ════════════════════════════════════ */
  .main {
    padding: 32px 28px;
    max-width: 1360px;
    margin: 0 auto;
    width: 100%;
    flex: 1;
  }

  /* ════════════════════════════════════
     SUMMARY CARDS
  ════════════════════════════════════ */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 14px;
    margin-bottom: 32px;
  }
  .summary-card {
    background: rgba(18,21,35,0.92);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 16px;
    padding: 20px;
    position: relative;
    overflow: hidden;
    transition: all 0.2s cubic-bezier(0.4,0,0.2,1);
    border-left: 4px solid transparent;
  }
  .summary-card:hover {
    background: rgba(24,27,44,0.96);
    transform: translateY(-2px);
    box-shadow: 0 12px 32px rgba(0,0,0,0.5);
  }
  .summary-card.accent { border-left-color: #3b82f6; }
  .summary-card.green  { border-left-color: var(--green); }
  .summary-card.yellow { border-left-color: var(--yellow); }
  .summary-card.red    { border-left-color: var(--red); }
  .summary-card.white  { border-left-color: rgba(255,255,255,0.4); }

  .summary-card-icon {
    width: 40px; height: 40px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    margin-bottom: 14px;
    flex-shrink: 0;
  }
  .summary-card .label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1.2px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .summary-card .value {
    font-size: 36px;
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1;
    margin-bottom: 4px;
  }
  .summary-card .sub {
    font-size: 11px;
    color: var(--muted);
    font-weight: 500;
  }

  /* ════════════════════════════════════
     TABS
  ════════════════════════════════════ */
  .tabs {
    display: flex;
    gap: 2px;
    margin-bottom: 24px;
    background: rgba(18,21,35,0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.12);
    padding: 4px;
    border-radius: 12px;
    width: fit-content;
  }
  .tab {
    padding: 8px 20px;
    border-radius: 9px;
    border: none;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.2s cubic-bezier(0.4,0,0.2,1);
    letter-spacing: 0.01em;
  }
  .tab.active {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 2px 10px rgba(192,57,43,0.3);
  }
  .tab:hover:not(.active) { color: var(--text); background: rgba(255,255,255,0.05); }

  /* ════════════════════════════════════
     SECTION HEADER
  ════════════════════════════════════ */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
  }
  .section-title {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  .section-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--muted);
    margin-bottom: 14px;
  }

  /* ════════════════════════════════════
     INVENTORY GRID & CARDS
  ════════════════════════════════════ */
  .inventory-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
    gap: 14px;
  }
  .item-card {
    background: rgba(18,21,35,0.92);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 16px;
    padding: 22px;
    transition: all 0.2s cubic-bezier(0.4,0,0.2,1);
    position: relative;
    overflow: hidden;
    cursor: default;
  }
  .item-card:hover {
    background: rgba(24,27,44,0.97);
    border-color: rgba(192,57,43,0.5);
    transform: translateY(-3px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
  }
  .item-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    opacity: 0;
    transition: opacity 0.2s cubic-bezier(0.4,0,0.2,1);
  }
  .item-card:hover::before { opacity: 1; }
  .item-card.low-stock { border-color: rgba(245,158,11,0.35); }
  .item-card.low-stock::before { background: var(--yellow); opacity: 0.8; }
  .item-card.out-of-stock { border-color: rgba(239,68,68,0.35); }
  .item-card.out-of-stock::before { background: var(--red); opacity: 0.8; }

  .item-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .item-icon {
    width: 48px; height: 48px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }
  .item-badge {
    font-size: 10px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
  }
  .badge-green { background: rgba(16,185,129,0.12); color: var(--green); border: 1px solid rgba(16,185,129,0.2); }
  .badge-yellow { background: rgba(245,158,11,0.12); color: var(--yellow); border: 1px solid rgba(245,158,11,0.2); }
  .badge-red { background: rgba(239,68,68,0.12); color: var(--red); border: 1px solid rgba(239,68,68,0.2); }

  .item-name {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 3px;
    letter-spacing: -0.01em;
    line-height: 1.3;
  }
  .item-category {
    font-size: 11px;
    color: var(--muted);
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }
  .item-qty {
    font-size: 48px;
    font-weight: 800;
    letter-spacing: -0.04em;
    margin: 12px 0 2px;
    line-height: 1;
  }
  .item-unit {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 18px;
    font-weight: 500;
    letter-spacing: 0.02em;
  }

  .item-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .qty-control {
    display: flex;
    align-items: center;
    gap: 0;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 100px;
    padding: 3px;
    flex: 1;
  }
  .qty-btn {
    width: 32px; height: 32px;
    border-radius: 100px;
    border: none;
    background: rgba(255,255,255,0.06);
    color: var(--text);
    cursor: pointer;
    font-size: 18px;
    font-weight: 500;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s cubic-bezier(0.4,0,0.2,1);
    line-height: 1;
    flex-shrink: 0;
  }
  .qty-btn:hover {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 2px 8px rgba(192,57,43,0.4);
  }
  .qty-input {
    flex: 1;
    background: transparent;
    border: none;
    text-align: center;
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    width: 36px;
    outline: none;
  }
  /* Hide number input spinners */
  .qty-input::-webkit-outer-spin-button,
  .qty-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .qty-input[type=number] { -moz-appearance: textfield; }

  .item-menu-btn {
    width: 38px; height: 38px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.03);
    color: var(--muted);
    cursor: pointer;
    font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s cubic-bezier(0.4,0,0.2,1);
    letter-spacing: 0;
    line-height: 1;
    flex-shrink: 0;
  }
  .item-menu-btn:hover {
    background: rgba(255,255,255,0.08);
    border-color: rgba(192,57,43,0.4);
    color: var(--text);
  }

  /* Progress Bar */
  .stock-bar { margin-top: 16px; }
  .stock-bar-label {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 7px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }
  .stock-bar-track {
    height: 6px;
    background: rgba(255,255,255,0.06);
    border-radius: 6px;
    overflow: hidden;
  }
  .stock-bar-fill {
    height: 100%;
    border-radius: 6px;
    transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
  }

  /* ════════════════════════════════════
     MODALS
  ════════════════════════════════════ */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s cubic-bezier(0.4,0,0.2,1);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: #0d0f1e;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 32px;
    width: 440px;
    max-width: 95vw;
    transform: scale(0.94) translateY(8px);
    transition: transform 0.2s cubic-bezier(0.4,0,0.2,1);
    box-shadow: 0 32px 80px rgba(0,0,0,0.6);
  }
  .modal-overlay.open .modal { transform: scale(1) translateY(0); }
  .modal-title {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 24px;
    letter-spacing: -0.02em;
  }
  .form-group { margin-bottom: 16px; }
  .form-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
    display: block;
  }
  .form-input, .form-select {
    width: 100%;
    padding: 11px 14px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 14px;
    font-weight: 500;
    outline: none;
    transition: border-color 0.2s cubic-bezier(0.4,0,0.2,1), box-shadow 0.2s cubic-bezier(0.4,0,0.2,1);
    -webkit-appearance: none;
  }
  .form-input:focus, .form-select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(192,57,43,0.15);
  }
  .form-input::placeholder { color: rgba(255,255,255,0.2); }
  .form-select option { background: #0d0f1e; color: var(--text); }
  .modal-footer {
    display: flex;
    gap: 10px;
    margin-top: 24px;
    justify-content: flex-end;
  }
  .modal-divider {
    height: 1px;
    background: rgba(255,255,255,0.07);
    margin: 20px 0;
  }

  /* ════════════════════════════════════
     LOG TABLE
  ════════════════════════════════════ */
  .log-filters {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
    align-items: center;
    flex-wrap: wrap;
  }
  .search-box {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 9px 14px;
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 13px;
    font-weight: 500;
    outline: none;
    width: 240px;
    transition: border-color 0.2s cubic-bezier(0.4,0,0.2,1), box-shadow 0.2s cubic-bezier(0.4,0,0.2,1);
  }
  .search-box::placeholder { color: rgba(255,255,255,0.2); }
  .search-box:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(192,57,43,0.1);
  }
  .log-table-wrap {
    overflow-x: auto;
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.07);
  }
  table {
    width: 100%;
    border-collapse: collapse;
    background: rgba(255,255,255,0.02);
  }
  thead { position: sticky; top: 0; z-index: 5; }
  th {
    background: rgba(13,15,24,0.9);
    backdrop-filter: blur(10px);
    padding: 14px 18px;
    text-align: left;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--muted);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    white-space: nowrap;
  }
  td {
    padding: 13px 18px;
    font-size: 13px;
    font-weight: 500;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    transition: background 0.15s;
  }
  tbody tr:hover td { background: rgba(255,255,255,0.03); }
  tbody tr:last-child td { border-bottom: none; }

  /* TX type badges */
  .tx-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: 0.4px;
    text-transform: uppercase;
  }
  .tx-in    { background: rgba(16,185,129,0.12); color: var(--green); border: 1px solid rgba(16,185,129,0.2); }
  .tx-out   { background: rgba(239,68,68,0.12); color: var(--red); border: 1px solid rgba(239,68,68,0.2); }
  .tx-adjust { background: rgba(245,158,11,0.12); color: var(--yellow); border: 1px solid rgba(245,158,11,0.2); }
  .tx-add   { background: rgba(192,57,43,0.12); color: var(--accent2); border: 1px solid rgba(192,57,43,0.2); }
  .tx-change-pos { color: var(--green); font-weight: 700; }
  .tx-change-neg { color: var(--red); font-weight: 700; }

  /* ════════════════════════════════════
     TOAST
  ════════════════════════════════════ */
  .toast-container {
    position: fixed;
    bottom: 24px;
    right: 24px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 2000;
  }
  .toast {
    background: #0d0f1e;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 13px 18px;
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 13px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 10px;
    transform: translateX(calc(100% + 40px));
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    min-width: 260px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    backdrop-filter: blur(10px);
  }
  .toast.show { transform: translateX(0); }
  .toast.toast-success { border-color: rgba(16,185,129,0.3); }
  .toast.toast-error { border-color: rgba(239,68,68,0.3); }
  .toast-icon {
    width: 24px; height: 24px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    flex-shrink: 0;
  }
  .toast-success .toast-icon { background: rgba(16,185,129,0.15); color: var(--green); }
  .toast-error   .toast-icon { background: rgba(239,68,68,0.15); color: var(--red); }

  /* ════════════════════════════════════
     EMPTY STATE
  ════════════════════════════════════ */
  .empty {
    text-align: center;
    padding: 70px 20px;
    color: var(--muted);
  }
  .empty .icon { font-size: 52px; margin-bottom: 14px; opacity: 0.5; }
  .empty p { font-size: 14px; font-weight: 500; }

  /* ════════════════════════════════════
     CHIP
  ════════════════════════════════════ */
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 2px 8px;
    font-size: 10px;
    color: var(--muted);
    font-weight: 600;
    letter-spacing: 0.4px;
  }

  /* ════════════════════════════════════
     MOBILE OVERLAY
  ════════════════════════════════════ */
  .sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 190;
    backdrop-filter: blur(4px);
  }
  .sidebar-overlay.visible { display: block; }

  /* ════════════════════════════════════
     RESPONSIVE
  ════════════════════════════════════ */
  @media (max-width: 1100px) {
    .summary-grid { grid-template-columns: repeat(3, 1fr); }
  }
  @media (max-width: 767px) {
    .sidebar {
      left: calc(-1 * var(--sidebar-w));
      width: var(--sidebar-w) !important;
      transition: left 0.25s cubic-bezier(0.4,0,0.2,1);
    }
    .sidebar.mobile-open { left: 0; }
    .layout { margin-left: 0 !important; }
    .mobile-menu-btn { display: flex; }
    .main { padding: 20px 16px; }
    .summary-grid { grid-template-columns: repeat(2, 1fr); }
    .sidebar-toggle { display: none; }
    .topbar { padding: 0 16px; }
    .topbar-date { display: none; }
  }
  @media (max-width: 500px) {
    .summary-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">

  <!-- Brand -->

  <!-- Nav -->

  <!-- Divider -->

<!-- Layout -->

  <!-- Topbar -->
  <div class="topbar">
    <div class="topbar-left">
      <button class="mobile-menu-btn" onclick="openMobileSidebar()" title="Open menu">☰</button>
      <div class="topbar-breadcrumb">
        <span class="topbar-breadcrumb-root">Masterform</span>
        <span class="topbar-breadcrumb-sep">/</span>
        <span class="topbar-breadcrumb-page" id="topbarTitle">Inventory</span>

<!-- Add Item Modal -->

<!-- Transaction Modal -->
<div class="modal-overlay" id="txModal">

<script>
// ─── Data ───────────────────────────────────────────────────────────────────
let items = JSON.parse(localStorage.getItem('inv_items') || '[]');
let logs  = JSON.parse(localStorage.getItem('inv_logs')  || '[]');
let txType = 'IN';

// Seed default items if empty
if (items.length === 0) {
  const defaults = [
    { id: uid(), name: 'Bar Chair', category: 'Bar Chair', variation: '', qty: 0, unit: 'pcs', threshold: 10 },
    { id: uid(), name: 'Metal Pallet 1.5mm', category: 'Metal Pallet', variation: '1.5mm', qty: 0, unit: 'pcs', threshold: 10 },
    { id: uid(), name: 'Metal Pallet 1.2mm', category: 'Metal Pallet', variation: '1.2mm', qty: 0, unit: 'pcs', threshold: 10 },
    { id: uid(), name: 'Metal Pallet 0.95mm', category: 'Metal Pallet', variation: '0.95mm', qty: 0, unit: 'pcs', threshold: 10 },
    { id: uid(), name: 'Metal Pallet 0.75mm', category: 'Metal Pallet', variation: '0.75mm', qty: 0, unit: 'pcs', threshold: 10 },
    { id: uid(), name: 'Timber Pallet', category: 'Timber Pallet', variation: '', qty: 0, unit: 'pcs', threshold: 10 },
  ];
  items = defaults;
  save();
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function save() {
  localStorage.setItem('inv_items', JSON.stringify(items));
  localStorage.setItem('inv_logs', JSON.stringify(logs));
}

// ─── Icons & Colors ─────────────────────────────────────────────────────────
function categoryStyle(cat) {
  const map = {
    'Bar Chair':     { icon: '🪑', bg: 'rgba(59,130,246,0.15)', color: '#3b82f6' },
    'Metal Pallet':  { icon: '🔩', bg: 'rgba(192,57,43,0.15)', color: '#c0392b' },
    'Timber Pallet': { icon: '🪵', bg: 'rgba(245,158,11,0.15)', color: '#f59e0b' },
  };
  return map[cat] || { icon: '📦', bg: 'rgba(255,255,255,0.08)', color: '#6b7280' };
}

function stockStatus(item) {
  if (item.qty <= 0) return 'out-of-stock';
  if (item.qty <= item.threshold) return 'low-stock';
  return 'in-stock';
}

function stockBadge(item) {
  const s = stockStatus(item);
  if (s === 'out-of-stock') return `<span class="item-badge badge-red">Out of Stock</span>`;
  if (s === 'low-stock')    return `<span class="item-badge badge-yellow">Low Stock</span>`;
  return `<span class="item-badge badge-green">In Stock</span>`;
}

function barColor(item) {
  const s = stockStatus(item);
  if (s === 'out-of-stock') return 'var(--red)';
  if (s === 'low-stock')    return 'var(--yellow)';
  return 'var(--green)';
}

// ─── Sidebar Stats ────────────────────────────────────────────────────────────
function updateSidebarStats() {
  const totalItems = items.length;
  const totalUnits = items.reduce((s, i) => s + i.qty, 0);
  const elItems = document.getElementById('stat-total-items');
  const elUnits = document.getElementById('stat-total-units');
  if (elItems) elItems.textContent = totalItems;
  if (elUnits) elUnits.textContent = totalUnits.toLocaleString();
}

// ─── Render Summary ──────────────────────────────────────────────────────────
function renderSummary() {
  const total   = items.length;
  const inStock = items.filter(i => i.qty > i.threshold).length;
  const low     = items.filter(i => i.qty > 0 && i.qty <= i.threshold).length;
  const out     = items.filter(i => i.qty <= 0).length;
  const totalQty = items.reduce((s,i) => s + i.qty, 0);

  document.getElementById('summaryGrid').innerHTML = `
    <div class="summary-card accent">
      <div class="summary-card-icon" style="background:rgba(59,130,246,0.12);">📦</div>
      <div class="label">Total Items</div>
      <div class="value" style="color:#3b82f6">${total}</div>
      <div class="sub">product types tracked</div>
    </div>
    <div class="summary-card green">
      <div class="summary-card-icon" style="background:rgba(16,185,129,0.12);">✅</div>
      <div class="label">In Stock</div>
      <div class="value" style="color:var(--green)">${inStock}</div>
      <div class="sub">above threshold</div>
    </div>
    <div class="summary-card yellow">
      <div class="summary-card-icon" style="background:rgba(245,158,11,0.12);">⚠️</div>
      <div class="label">Low Stock</div>
      <div class="value" style="color:var(--yellow)">${low}</div>
      <div class="sub">needs attention</div>
    </div>
    <div class="summary-card red">
      <div class="summary-card-icon" style="background:rgba(239,68,68,0.12);">🚨</div>
      <div class="label">Out of Stock</div>
      <div class="value" style="color:var(--red)">${out}</div>
      <div class="sub">restock required</div>
    </div>
    <div class="summary-card white">
      <div class="summary-card-icon" style="background:rgba(255,255,255,0.06);">📊</div>
      <div class="label">Total Units</div>
      <div class="value" style="color:var(--text)">${totalQty.toLocaleString()}</div>
      <div class="sub">across all items</div>
    </div>
  `;
  updateSidebarStats();
}

// ─── Render Inventory ────────────────────────────────────────────────────────
function renderInventory() {
  const filter = document.getElementById('categoryFilter').value;
  let filtered = filter ? items.filter(i => i.category === filter) : items;

  if (filtered.length === 0) {
    document.getElementById('inventoryGrid').innerHTML = `
      <div class="empty" style="grid-column:1/-1">
        <div class="icon">📭</div>
        <p>No items found. Add some inventory!</p>
      </div>`;
    return;
  }

  // Sort: out → low → in
  const order = { 'out-of-stock':0, 'low-stock':1, 'in-stock':2 };
  filtered = [...filtered].sort((a,b) => order[stockStatus(a)] - order[stockStatus(b)]);

  document.getElementById('inventoryGrid').innerHTML = filtered.map(item => {
    const style = categoryStyle(item.category);
    const status = stockStatus(item);
    const maxBar = Math.max(item.qty, item.threshold * 2, 1);
    const fillPct = Math.min((item.qty / maxBar) * 100, 100);
    const varChip = item.variation ? `<span class="chip">📐 ${item.variation}</span>` : '';

    return `
    <div class="item-card ${status}" id="card-${item.id}">
      <div class="item-header">
        <div class="item-icon" style="background:${style.bg};">${style.icon}</div>
        ${stockBadge(item)}
      </div>
      <div class="item-name">${item.name}</div>
      <div class="item-category">${item.category} ${varChip}</div>
      <div class="item-qty" style="color:${barColor(item)}">${item.qty.toLocaleString()}</div>
      <div class="item-unit">${item.unit} &nbsp;·&nbsp; Alert at ${item.threshold}</div>

      <div class="item-actions">
        <div class="qty-control">
          <button class="qty-btn" onclick="quickAdjust('${item.id}', -1)">−</button>
          <input class="qty-input" type="number" value="1" min="1" id="qin-${item.id}">
          <button class="qty-btn" onclick="quickAdjust('${item.id}', 1)">＋</button>
        </div>
        <button class="item-menu-btn" onclick="openEditModal('${item.id}')" title="Edit item">⋯</button>
      </div>

      <div class="stock-bar">
        <div class="stock-bar-label">
          <span>Stock Level</span>
          <span>${item.qty} / ${item.threshold * 2}</span>
        </div>
        <div class="stock-bar-track">
          <div class="stock-bar-fill" style="width:${fillPct}%;background:${barColor(item)};"></div>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ─── Quick Adjust (card +/- buttons) ────────────────────────────────────────
function quickAdjust(id, dir) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  const qInput = document.getElementById(`qin-${id}`);
  const qty = parseInt(qInput?.value) || 1;
  const change = dir * qty;
  const newQty = Math.max(0, item.qty + change);
  const diff = newQty - item.qty;
  if (diff === 0) return;
  item.qty = newQty;
  logs.unshift({ id: uid(), ts: new Date().toISOString(), itemId: id, itemName: item.name, type: diff > 0 ? 'IN' : 'OUT', change: diff, balance: newQty, note: 'Quick adjust' });
  save();
  // Update only this card in-place — no full re-render so the card stays put
  updateCardInPlace(item);
  renderSummary();
  toast(diff > 0 ? `+${diff} added to ${item.name}` : `${diff} removed from ${item.name}`, diff > 0 ? 'success' : 'error');
}

// Update a single card's visuals without moving it in the grid
function updateCardInPlace(item) {
  const card = document.getElementById(`card-${item.id}`);
  if (!card) return;

  const status = stockStatus(item);
  const color  = barColor(item);
  const maxBar = Math.max(item.qty, item.threshold * 2, 1);
  const fillPct = Math.min((item.qty / maxBar) * 100, 100);

  // Card border class
  card.className = `item-card ${status}`;

  // Quantity number + colour
  const qtyEl = card.querySelector('.item-qty');
  if (qtyEl) { qtyEl.textContent = item.qty.toLocaleString(); qtyEl.style.color = color; }

  // Status badge
  const headerEl = card.querySelector('.item-header');
  if (headerEl) {
    const badge = headerEl.querySelector('.item-badge');
    if (badge) badge.outerHTML; // placeholder — replace below
    headerEl.innerHTML = headerEl.innerHTML.replace(
      /<span class="item-badge[^"]*">[^<]*<\/span>/,
      stockBadge(item)
    );
  }

  // Progress bar fill + label
  const fill = card.querySelector('.stock-bar-fill');
  if (fill) { fill.style.width = fillPct + '%'; fill.style.background = color; }
  const barLabel = card.querySelector('.stock-bar-label span:last-child');
  if (barLabel) barLabel.textContent = `${item.qty} / ${item.threshold * 2}`;
}

// ─── Transaction Modal ───────────────────────────────────────────────────────
function openTransactionModal(preItemId) {
  const sel = document.getElementById('txItem');
  sel.innerHTML = items.map(i => `<option value="${i.id}">${i.name} (${i.qty} ${i.unit})</option>`).join('');
  if (preItemId) sel.value = preItemId;
  setTxType('IN', null);
  document.getElementById('txNote').value = '';
  document.getElementById('txQty').value = 1;
  openModal('txModal');
}

function setTxType(type, btn) {
  txType = type;
  // Reset all type buttons to subtle
  document.querySelectorAll('#txModal .btn').forEach(b => {
    if (['Stock In','Stock Out','Adjust'].some(t => b.textContent.includes(t))) {
      b.className = 'btn btn-subtle';
      b.style.flex = '1';
    }
  });
  // Highlight the active button — use passed btn or find it by text
  const target = btn || [...document.querySelectorAll('#txModal .btn')].find(b =>
    (type === 'IN'     && b.textContent.includes('Stock In'))  ||
    (type === 'OUT'    && b.textContent.includes('Stock Out')) ||
    (type === 'ADJUST' && b.textContent.includes('Adjust'))
  );
  if (target) {
    target.className = type === 'IN' ? 'btn btn-success' : type === 'OUT' ? 'btn btn-danger' : 'btn btn-primary';
    target.style.flex = '1';
  }
  const labels = { IN: 'Quantity to Add', OUT: 'Quantity to Remove', ADJUST: 'Set Stock to (absolute value)' };
  document.getElementById('txQtyLabel').textContent = labels[type];
}

function applyTransaction() {
  const id = document.getElementById('txItem').value;
  const qty = parseInt(document.getElementById('txQty').value);
  const note = document.getElementById('txNote').value;
  // ADJUST allows 0 (set stock to zero); IN/OUT require a positive number
  const invalid = isNaN(qty) || qty < 0 || (txType !== 'ADJUST' && qty <= 0);
  if (invalid) { toast('Enter a valid quantity', 'error'); return; }

  const item = items.find(i => i.id === id);
  if (!item) return;
  const before = item.qty;
  if (txType === 'IN')     item.qty = before + qty;
  if (txType === 'OUT')    item.qty = Math.max(0, before - qty);
  if (txType === 'ADJUST') item.qty = qty;
  const diff = item.qty - before;

  logs.unshift({ id: uid(), ts: new Date().toISOString(), itemId: id, itemName: item.name, type: txType, change: diff, balance: item.qty, note });
  save(); renderAll(); closeModal('txModal');
  toast(`${item.name} updated → ${item.qty} ${item.unit}`, 'success');
}

// ─── Add Item Modal ──────────────────────────────────────────────────────────
function openAddModal() {
  // Fully reset every field — don't rely on previous state
  document.getElementById('addName').value = '';
  document.getElementById('addQty').value = 0;
  document.getElementById('addUnit').value = 'pcs';
  document.getElementById('addThreshold').value = 10;
  // Force category back to first option (Bar Chair) using selectedIndex
  const catSel = document.getElementById('addCategory');
  catSel.selectedIndex = 0;
  // Also reset variation dropdown to first option
  document.getElementById('addVariation').selectedIndex = 0;
  // Hide variation group since default is Bar Chair
  document.getElementById('variationGroup').style.display = 'none';
  openModal('addModal');
  setTimeout(() => document.getElementById('addName').focus(), 200);
}

function toggleVariation() {
  const cat = document.getElementById('addCategory').value;
  document.getElementById('variationGroup').style.display = cat === 'Metal Pallet' ? 'block' : 'none';
}

function addItem() {
  const name     = document.getElementById('addName').value.trim();
  const category = document.getElementById('addCategory').value;
  // Only use variation if category is Metal Pallet AND variation group is visible
  const variationGroup = document.getElementById('variationGroup');
  const variation = (category === 'Metal Pallet' && variationGroup.style.display !== 'none')
    ? document.getElementById('addVariation').value
    : '';
  const qty      = parseInt(document.getElementById('addQty').value) || 0;
  const unit     = document.getElementById('addUnit').value.trim() || 'pcs';
  const threshold = parseInt(document.getElementById('addThreshold').value) || 10;
  if (!name) { toast('Please enter an item name', 'error'); return; }

  // Keep name clean — variation shown as separate chip on the card, not appended to name
  const id = uid();
  const displayName = variation ? `${name} (${variation})` : name;
  items.push({ id, name: displayName, category, variation, qty, unit, threshold });
  logs.unshift({ id: uid(), ts: new Date().toISOString(), itemId: id, itemName: displayName, type: 'ADD', change: qty, balance: qty, note: 'Item created' });
  save(); renderAll(); closeModal('addModal');
  toast(`"${displayName}" added to inventory`, 'success');
}

// ─── Edit Modal ──────────────────────────────────────────────────────────────
function openEditModal(id) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  document.getElementById('editId').value = id;
  document.getElementById('editName').value = item.name;
  document.getElementById('editUnit').value = item.unit;
  document.getElementById('editThreshold').value = item.threshold;
  openModal('editModal');
}

function saveEdit() {
  const id   = document.getElementById('editId').value;
  const item = items.find(i => i.id === id);
  if (!item) return;
  item.name      = document.getElementById('editName').value.trim() || item.name;
  item.unit      = document.getElementById('editUnit').value.trim() || item.unit;
  item.threshold = parseInt(document.getElementById('editThreshold').value) || 10;
  save(); renderAll(); closeModal('editModal');
  toast('Item updated', 'success');
}

function deleteItem() {
  const id = document.getElementById('editId').value;
  if (!confirm('Delete this item? This cannot be undone.')) return;
  items = items.filter(i => i.id !== id);
  save(); renderAll(); closeModal('editModal');
  toast('Item deleted', 'error');
}

// ─── Log Tab ─────────────────────────────────────────────────────────────────
function renderLog() {
  const search  = document.getElementById('logSearch').value.toLowerCase();
  const typeF   = document.getElementById('logTypeFilter').value;
  let filtered  = logs.filter(l => {
    const matchT = !typeF || l.type === typeF;
    const matchS = !search || l.itemName.toLowerCase().includes(search) || (l.note||'').toLowerCase().includes(search);
    return matchT && matchS;
  });

  const tbody = document.getElementById('logBody');
  if (filtered.length === 0) {
    tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:48px;font-weight:500;">No transactions found</td></tr>`;
    return;
  }
  tbody.innerHTML = filtered.map(l => {
    const d = new Date(l.ts);
    const dateStr = d.toLocaleDateString('en-AU', { day:'2-digit', month:'short', year:'numeric' });
    const timeStr = d.toLocaleTimeString('en-AU', { hour:'2-digit', minute:'2-digit' });
    const typeMap = {
      IN:     `<span class="tx-badge tx-in">⬆ IN</span>`,
      OUT:    `<span class="tx-badge tx-out">⬇ OUT</span>`,
      ADJUST: `<span class="tx-badge tx-adjust">⚙ ADJUST</span>`,
      ADD:    `<span class="tx-badge tx-add">✦ ADDED</span>`,
    };
    const changeStr = l.change >= 0
      ? `<span class="tx-change-pos">+${l.change}</span>`
      : `<span class="tx-change-neg">${l.change}</span>`;
    return `
      <tr>
        <td style="white-space:nowrap;">
          <div style="font-weight:600;font-size:13px;">${dateStr}</div>
          <div style="color:var(--muted);font-size:11px;margin-top:2px;">${timeStr}</div>
        </td>
        <td><span style="font-weight:600;">${l.itemName}</span></td>
        <td>${typeMap[l.type] || l.type}</td>
        <td>${changeStr}</td>
        <td style="font-weight:600;">${l.balance}</td>
        <td style="color:var(--muted);font-size:12px;">${l.note || '—'}</td>
      </tr>`;
  }).join('');
}

function clearLog() {
  if (!confirm('Clear all transaction history?')) return;
  logs = [];
  save(); renderLog();
  toast('Transaction log cleared', 'error');
}

// ─── Tab Switching ────────────────────────────────────────────────────────────
function switchTab(tab, el) {
  document.getElementById('tab-inventory').style.display = tab === 'inventory' ? '' : 'none';
  document.getElementById('tab-log').style.display       = tab === 'log' ? '' : 'none';
  // Sync in-content tab buttons
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  if (el) el.classList.add('active');
  // Sync sidebar nav items
  document.getElementById('nav-inventory').classList.toggle('active', tab === 'inventory');
  document.getElementById('nav-log').classList.toggle('active', tab === 'log');
  // Update topbar title
  const titles = { inventory: 'Inventory', log: 'Transaction Log' };
  const topbarTitleEl = document.getElementById('topbarTitle');
  if (topbarTitleEl && titles[tab]) topbarTitleEl.textContent = titles[tab];
  if (tab === 'log') renderLog();
}

// Called from sidebar nav items (no tab button element to pass)
function sidebarSwitchTab(tab) {
  const tabBtn = document.getElementById(`tab-btn-${tab}`);
  switchTab(tab, tabBtn);
  // On mobile, close sidebar after navigation
  closeMobileSidebar();
}

// ─── Sidebar Collapse / Expand ────────────────────────────────────────────────
function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const layout  = document.getElementById('layout');
  const btn     = document.getElementById('toggleBtn');
  const collapsed = sidebar.classList.toggle('collapsed');
  layout.classList.toggle('collapsed', collapsed);
  btn.textContent = collapsed ? '▶' : '☰';
  btn.title = collapsed ? 'Expand sidebar' : 'Collapse sidebar';
  localStorage.setItem('sidebar_collapsed', collapsed ? '1' : '0');
}

// Restore sidebar state on load
(function restoreSidebarState() {
  if (localStorage.getItem('sidebar_collapsed') === '1') {
    const sidebar = document.getElementById('sidebar');
    const layout  = document.getElementById('layout');
    const btn     = document.getElementById('toggleBtn');
    sidebar.classList.add('collapsed');
    layout.classList.add('collapsed');
    if (btn) { btn.textContent = '▶'; btn.title = 'Expand sidebar'; }
  }
})();

// ─── Mobile Sidebar ───────────────────────────────────────────────────────────
function openMobileSidebar() {
  document.getElementById('sidebar').classList.add('mobile-open');
  document.getElementById('sidebarOverlay').classList.add('visible');
}

function closeMobileSidebar() {
  document.getElementById('sidebar').classList.remove('mobile-open');
  document.getElementById('sidebarOverlay').classList.remove('visible');
}

// ─── Modals ───────────────────────────────────────────────────────────────────
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); });
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.querySelectorAll('.modal-overlay.open').forEach(m => m.classList.remove('open'));
});

// ─── Toast ────────────────────────────────────────────────────────────────────
function toast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  const icon = type === 'success' ? '✓' : '✕';
  el.innerHTML = `<div class="toast-icon">${icon}</div><span>${msg}</span>`;
  document.getElementById('toastContainer').appendChild(el);
  requestAnimationFrame(() => { el.classList.add('show'); });
  setTimeout(() => { el.classList.remove('show'); setTimeout(() => el.remove(), 300); }, 2800);
}

// ─── Export ───────────────────────────────────────────────────────────────────
function exportData() {
  const rows = [['Item Name','Category','Variation','Qty','Unit','Threshold','Status']];
  items.forEach(i => rows.push([i.name, i.category, i.variation, i.qty, i.unit, i.threshold, stockStatus(i)]));
  const csv = rows.map(r => r.map(v => `"${v}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = `inventory_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  toast('Inventory exported as CSV', 'success');
}

// ─── Topbar date ──────────────────────────────────────────────────────────────
(function setTopbarDate() {
  const el = document.getElementById('topbarDate');
  if (!el) return;
  const now = new Date();
  el.textContent = now.toLocaleDateString('en-AU', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });
})();

// ─── Render All ───────────────────────────────────────────────────────────────
function renderAll() {
  renderSummary();
  renderInventory();
  updateSidebarStats();
}

renderAll();
</script>
